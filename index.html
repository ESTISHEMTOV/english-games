<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>משחקים באנגלית 🎈</title>
  <script>document.write('<link rel="stylesheet" href="shared.css?t=' + Date.now() + '">');</script>
  <style>
    .hero { font-size: clamp(54px, 12vw, 110px); line-height: 1; margin: 18px 0 4px; }
    .float { display:inline-block; animation: bob 3s ease-in-out infinite; }
    .float:nth-child(2){ animation-delay:.4s } .float:nth-child(3){ animation-delay:.8s }
    @keyframes bob { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-14px) } }
    .footer-note { margin-top: 34px; color: var(--ink-soft); font-size: 15px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <span class="float">🎈</span><span class="float">🇬🇧</span><span class="float">⭐</span>
    </div>
    <h1 class="page-title">משחקים באנגלית</h1>
    <p class="subtitle">בחרו מי משחק עכשיו 👇</p>

    <div class="pickers">
      <button class="picker shai" onclick="go('shai.html')">
        <span class="ava" aria-hidden="true">
          <svg class="ava-svg" viewBox="0 0 120 150" xmlns="http://www.w3.org/2000/svg">
            <!-- שיער ארוך מאחור (כמו הילדה של ליה, רק ארוך) -->
            <path d="M18 66 C16 34 34 12 60 12 C86 12 104 34 102 66 L100 130 Q99 139 90 136 Q84 134 84 124 L83 100 Q60 112 37 100 L36 124 Q36 134 30 136 Q21 139 20 130 Z" fill="#7a4a2b"/>
            <!-- פנים -->
            <ellipse cx="60" cy="56" rx="30" ry="32" fill="#f8c69c"/>
            <!-- פוני (תספורת אמוג'י) -->
            <path d="M30 56 C30 28 44 16 60 16 C76 16 90 28 90 56 C86 44 76 42 68 48 C64 40 56 40 52 48 C44 42 34 44 30 56 Z" fill="#7a4a2b"/>
            <!-- עיניים -->
            <ellipse cx="49" cy="58" rx="4.2" ry="5" fill="#3a2a20"/>
            <ellipse cx="71" cy="58" rx="4.2" ry="5" fill="#3a2a20"/>
            <circle cx="50.6" cy="56.2" r="1.5" fill="#fff"/>
            <circle cx="72.6" cy="56.2" r="1.5" fill="#fff"/>
            <!-- לחיים -->
            <circle cx="42" cy="69" r="5" fill="#ff9ab0" opacity=".55"/>
            <circle cx="78" cy="69" r="5" fill="#ff9ab0" opacity=".55"/>
            <!-- חיוך -->
            <path d="M51 72 Q60 80 69 72" stroke="#c0392b" stroke-width="3" fill="none" stroke-linecap="round"/>
            <!-- סיכת שיער ורודה -->
            <rect x="70" y="27" width="16" height="8" rx="4" transform="rotate(20 78 31)" fill="#ff5d8f"/>
            <circle cx="72" cy="33" r="2" fill="#ffd23f"/>
          </svg>
        </span>
        <span class="name">שי</span>
        <span class="age">בת 5 · מתחילים</span>
      </button>
      <button class="picker lia" onclick="go('lia.html')">
        <span class="ava">👧</span>
        <span class="name">ליה</span>
        <span class="age">בת 5 · מתחילים</span>
      </button>
      <button class="picker yonatan" onclick="go('yonatan.html')">
        <span class="ava">👦</span>
        <span class="name">יונתן</span>
        <span class="age">בן 6 · מתחילים</span>
      </button>
      <button class="picker tom" onclick="go('tom.html')">
        <span class="ava">👩‍🎓</span>
        <span class="name">תום</span>
        <span class="age">בת 9 · מתקדמים</span>
      </button>
    </div>

    <p class="footer-note" id="micTip"></p>
  </div>

  <script>document.write('<script src="shared.js?t=' + Date.now() + '"><\/script>');</script>
  <script>
    function go(page) {
      if (window.speechSynthesis) speechSynthesis.cancel(); // לעצור כל דיבור לפני המעבר
      soundPop(); primeAudio();
      setTimeout(() => (location.href = page), 120);
    }

    // טיפ לגבי מיקרופון — תלוי אם נפתח דרך השרת (localhost) או ישירות מהקובץ
    const tip = document.getElementById("micTip");
    if (window.isSecureContext) {
      tip.innerHTML = "🎤 המיקרופון מוכן! בלחיצה הראשונה אשרו את הבקשה (Allow) כדי לחזור על המילים ולקבל משוב על ההגייה.";
    } else {
      tip.innerHTML = "💡 כדי לחזור על המילים עם משוב על ההגייה — סגרו ופתחו את המשחק עם הקובץ <b>הפעלה.bat</b> שבתיקייה (נפתח ב-Chrome עם מיקרופון). שאר המשחקים עובדים גם ככה.";
    }
  </script>
</body>
</html>
