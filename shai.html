<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>המשחקים של שי 🧒</title>
  <script>document.write('<link rel="stylesheet" href="shared.css?t=' + Date.now() + '">');</script>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <button class="btn-back" id="back">⬅️ חזרה</button>
      <div class="score" id="score">⭐ 0</div>
    </div>

    <!-- תפריט המשחקים -->
    <div id="menu">
      <div class="hero-ava" aria-hidden="true">
        <svg class="ava-svg" viewBox="0 0 120 150" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 62 C22 30 38 12 60 12 C82 12 98 30 96 62 L94 126 Q93 135 84 131 Q79 129 79 118 L79 86 C72 90 48 90 41 86 L41 118 Q41 129 36 131 Q27 135 26 126 Z" fill="#7a4a2b"/>
          <ellipse cx="60" cy="58" rx="29" ry="31" fill="#ffe0bd"/>
          <path d="M31 60 C31 30 44 18 60 18 C76 18 89 30 89 60 C84 48 74 45 70 52 C65 41 55 41 50 52 C46 45 36 48 31 60 Z" fill="#7a4a2b"/>
          <circle cx="50" cy="58" r="4.6" fill="#3a2a20"/>
          <circle cx="70" cy="58" r="4.6" fill="#3a2a20"/>
          <circle cx="51.6" cy="56.4" r="1.5" fill="#fff"/>
          <circle cx="71.6" cy="56.4" r="1.5" fill="#fff"/>
          <circle cx="43" cy="69" r="5" fill="#ff9ab0" opacity=".55"/>
          <circle cx="77" cy="69" r="5" fill="#ff9ab0" opacity=".55"/>
          <path d="M50 71 Q60 81 70 71" stroke="#c0392b" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M73 24 L86 18 L86 33 Z" fill="#ff5d8f"/>
          <path d="M91 18 L78 25 L91 32 Z" fill="#ff5d8f"/>
          <circle cx="82" cy="25" r="3.6" fill="#ffb3c9"/>
        </svg>
      </div>
      <h1 class="page-title">היי שי! 👋</h1>
      <p class="subtitle">איזה משחק נשחק היום?</p>
      <div class="games-grid">
        <button class="game-card c-peach"  onclick="Games.about()">
          <span class="ico">💬</span><span class="ttl">קצת עליי</span><span class="sub">להציג את עצמי באנגלית</span>
        </button>
        <button class="game-card c-pink"   onclick="Games.flash()">
          <span class="ico">🎧</span><span class="ttl">שמעי וחזרי</span><span class="sub">לשמוע מילה ולחזור</span>
        </button>
        <button class="game-card c-teal"   onclick="Games.abc()">
          <span class="ico">🔤</span><span class="ttl">אותיות ABC</span><span class="sub">ללמוד את האותיות</span>
        </button>
        <button class="game-card c-blue"   onclick="Games.find()">
          <span class="ico">🔍</span><span class="ttl">מצאי את התמונה</span><span class="sub">לשמוע ולמצוא</span>
        </button>
        <button class="game-card c-yellow" onclick="Games.colors()">
          <span class="ico">🌈</span><span class="ttl">צבעים</span><span class="sub">ללמוד צבעים</span>
        </button>
        <button class="game-card c-green"  onclick="Games.memory()">
          <span class="ico">🃏</span><span class="ttl">מצאי את הזוג</span><span class="sub">משחק זיכרון</span>
        </button>
        <button class="game-card c-purple" onclick="Games.progress()">
          <span class="ico">🏆</span><span class="ttl">הנקודות שלי</span><span class="sub">שלבים ואליפויות</span>
        </button>
      </div>
    </div>

    <!-- מסך המשחק -->
    <div id="stageWrap" class="hidden">
      <div class="stage" id="stage"></div>
    </div>
  </div>

  <script>(function(){var t=Date.now();document.write('<script src="data.js?t='+t+'"><\/script>');document.write('<script src="shared.js?t='+t+'"><\/script>');})();</script>
  <script>
    const stageWrap = document.getElementById("stageWrap");
    const stage = document.getElementById("stage");
    const menu = document.getElementById("menu");
    Score.init(document.getElementById("score"), "shai");

    document.getElementById("back").onclick = () => {
      if (!stageWrap.classList.contains("hidden")) { showMenu(); }
      else { location.href = "index.html"; }
    };
    function showMenu() { speechSynthesis && speechSynthesis.cancel(); stageWrap.classList.add("hidden"); menu.classList.remove("hidden"); }
    function showStage() { menu.classList.add("hidden"); stageWrap.classList.remove("hidden"); stage.innerHTML = ""; }

    // מאגר מילים ידידותי לבת 5 (פשוטות וחזותיות)
    const EASY = ALL_WORDS.filter(w => ["animals","food","colors","nature","things"].includes(w.topic));

    const Games = {
      /* ---------- 💬 קצת עליי — משפטי היכרות ---------- */
      about() {
        showStage();
        const SENT = ABOUT_ME.shai;
        let i = 0;
        const render = () => {
          const s = SENT[i];
          stage.innerHTML = "";
          stage.appendChild(el("div", "prompt-he", "ככה מספרים על עצמי 🌟 תשמעי ותגידי גם את!"));
          stage.appendChild(el("div", "dots", SENT.map((_, k) => `<span class="${k <= i ? 'on' : ''}"></span>`).join("")));
          stage.appendChild(el("div", "big-emoji", s.emoji));
          stage.appendChild(el("div", "sentence-en", s.en));
          const heBtn = el("button", "sentence-he he-say", "🔈 " + s.he);
          heBtn.onclick = () => speakHe(s.he);
          stage.appendChild(heBtn);
          const fb = el("div", "feedback");
          const acts = el("div", "actions");
          const bL = el("button", "action listen", "🔊 שמעי");
          bL.onclick = async () => { fb.className = "feedback"; fb.textContent = ""; await speakEn(s.en); };
          const bS = el("button", "action speak", "🎤 תורי!");
          bS.onclick = () => sayAndCheer(s, fb, bS);
          const last = i >= SENT.length - 1;
          const bN = el("button", "action next", last ? "🎉 סיימתי!" : "➡️ עוד משפט");
          bN.onclick = () => { if (last) { finishAbout(); } else { i++; render(); } };
          acts.append(bL, bS, bN);
          stage.append(fb, acts);
          speakHe("תגידי").then(() => speakEn(s.en));
        };
        render();
      },

      /* ---------- 1. שמעי וחזרי ---------- */
      flash() {
        showStage();
        let pool = shuffle(EASY);
        let i = 0;
        const render = () => {
          const w = pool[i % pool.length];
          stage.innerHTML = "";
          stage.appendChild(el("div", "prompt-he", "תשמעי את המילה… ותגידי אותה גם את! 🗣️"));
          stage.appendChild(el("div", "big-emoji", w.emoji));
          stage.appendChild(el("div", "big-word", w.en));
          const fb = el("div", "feedback"); stage.appendChild(fb);
          const acts = el("div", "actions");

          const bListen = el("button", "action listen", "🔊 שמעי");
          bListen.onclick = async () => { fb.className = "feedback"; fb.textContent = ""; await speakEn(w.en); };

          const bSpeak = el("button", "action speak", "🎤 תורי!");
          bSpeak.onclick = () => recordAndScore(w, fb, bSpeak, "he");

          const bNext = el("button", "action next", "➡️ עוד מילה");
          bNext.onclick = () => { i++; render(); };

          acts.append(bListen, bSpeak, bNext);
          stage.appendChild(acts);

          // הוראה קולית + הקראת המילה
          speakHe("תשמעי את המילה ותגידי אותה").then(() => speakEn(w.en));
        };
        render();
      },

      /* ---------- 2. מצאי את התמונה ---------- */
      find(list) {
        showStage();
        const source = list || EASY;
        const round = () => {
          const opts = sample(source, 4);
          const target = randItem(opts);
          stage.innerHTML = "";
          stage.appendChild(el("div", "prompt-he", "תשמעי איזו מילה… ותלחצי על התמונה הנכונה! 👆"));
          const fb = el("div", "feedback");
          const choices = el("div", "choices");
          opts.forEach(o => {
            const c = el("button", "choice");
            c.innerHTML = `<span class="ce">${o.emoji}</span>`;
            c.onclick = () => {
              if (o.en === target.en) {
                c.classList.add("correct"); soundCorrect(); Score.add(); confetti(70);
                fb.className = "feedback great"; fb.textContent = "כל הכבוד! 🎉";
                // ממתינים שההקראה תסיים את המילה ורק אז עוברים הלאה
                speakHe("מצוין! זה " + target.he).then(() => setTimeout(round, 800));
              } else {
                c.classList.add("wrong"); soundTry();
                fb.className = "feedback try"; fb.textContent = "אופס, עוד פעם 🙂";
                speakHe("לא נורא, עוד פעם!");
                setTimeout(() => c.classList.remove("wrong"), 500);
              }
            };
            choices.appendChild(c);
          });
          stage.appendChild(choices);
          stage.appendChild(fb);
          const hear = el("div", "actions");
          const b = el("button", "action listen", "🔊 שמעי שוב");
          b.onclick = () => speakEn(target.en);
          hear.appendChild(b); stage.appendChild(hear);
          speakHe("איפה").then(() => speakEn(target.en));
        };
        round();
      },

      /* ---------- 3. צבעים ---------- */
      colors() { this.find(ALL_WORDS.filter(w => w.topic === "colors")); },

      /* ---------- ABC — לימוד האותיות ---------- */
      abc() {
        showStage();
        let i = 0;
        const render = () => {
          const it = ABC[i % ABC.length];
          stage.innerHTML = "";
          stage.appendChild(el("div", "prompt-he", "תשמעי את האות… ותגידי אותה גם את! 🔤"));
          stage.appendChild(el("div", "big-word", it.L + " " + it.L.toLowerCase()));
          stage.appendChild(el("div", "big-emoji", it.emoji));
          stage.appendChild(el("div", "prompt-en", it.word));
          const fb = el("div", "feedback");
          const acts = el("div", "actions");
          const bL = el("button", "action listen", "🔊 שמעי");
          bL.onclick = () => { fb.className = "feedback"; fb.textContent = ""; speakEn(it.L).then(() => speakEn(it.word)); };
          const bS = el("button", "action speak", "🎤 תורי!");
          bS.onclick = () => recordAndScore({ en: it.L, he: it.L }, fb, bS, "he");
          const bN = el("button", "action next", "➡️ האות הבאה");
          bN.onclick = () => { i++; render(); };
          acts.append(bL, bS, bN);
          stage.append(fb, acts);
          speakHe("האות").then(() => speakEn(it.L)).then(() => speakEn(it.word));
        };
        render();
      },

      /* ---------- 4. משחק זיכרון (תמונות) ---------- */
      memory() {
        showStage();
        const picks = sample(EASY, 6);
        const deck = shuffle([...picks, ...picks].map((w, idx) => ({ ...w, uid: idx })));
        stage.innerHTML = "";
        stage.appendChild(el("div", "prompt-he", "מצאי את שני הקלפים הזהים! 🃏"));
        const grid = el("div", "memory");
        let first = null, lock = false, matched = 0;
        deck.forEach((w) => {
          const card = el("button", "mcard");
          card.innerHTML = `<span class="back">❓</span><span class="face">${w.emoji}</span>`;
          card.onclick = () => {
            if (lock || card.classList.contains("up") || card.classList.contains("matched")) return;
            soundPop(); card.classList.add("up");
            speakEn(w.en);                 // אומרת את המילה באנגלית בכל היפוך קלף
            lock = true;                   // נעילה כדי שתספיק להגיד את המילה
            if (!first) {
              first = { card, w };
              setTimeout(() => { lock = false; }, 1500);
              return;
            }
            // קלף שני
            if (first.w.en === w.en) {
              card.classList.add("matched"); first.card.classList.add("matched");
              Score.add(); matched++;
              setTimeout(() => {
                soundCorrect(); first = null; lock = false;
                if (matched === picks.length) { confetti(150); soundWin(); speakHe("יש! כל הכבוד!"); }
              }, 1500);
            } else {
              setTimeout(() => {
                card.classList.remove("up"); first.card.classList.remove("up");
                first = null; lock = false;
              }, 1500);
            }
          };
          grid.appendChild(card);
        });
        stage.appendChild(grid);
        speakHe("מצאי את שני הקלפים הזהים");
      },

      /* ---------- 🏆 הנקודות שלי ---------- */
      progress() {
        showStage();
        renderProgress(stage, "shai");
        speakHe("אלה הנקודות שלך. כל הכבוד!");
      },
    };

    /* אמירת משפט במשחק "קצת עליי" — משוב מעודד ורחום (לגיל 5) */
    async function sayAndCheer(s, fb, btn) {
      if (!RECOGNITION_OK) {
        fb.className = "feedback great"; fb.textContent = "כל הכבוד! 👏";
        Score.add(); soundCorrect(); speakHe("כל הכבוד!"); return;
      }
      fb.className = "feedback heard"; fb.textContent = "🎤 רגע…";
      const ok = await ensureMic();
      if (!ok) {
        fb.className = "feedback try"; fb.textContent = "אין גישה למיקרופון 🎤";
        showMicNote(fb); speakHe("צריך לאשר מיקרופון"); return;
      }
      btn.classList.add("recording"); btn.disabled = true;
      fb.className = "feedback heard"; fb.textContent = "🎤 מקשיבה לך…";
      try {
        const res = await listen("en-US");
        const verdict = scorePronunciation(s.en, res.alternatives);
        if (verdict === "try") {
          // עדיין מעודדים — מזמינים לשמוע ולנסות שוב, בלי תסכול
          fb.className = "feedback close"; fb.textContent = "יופי שניסית! בואי נשמע שוב 👂";
          soundTry(); await speakHe("יופי! תקשיבי שוב"); await speakEnSlow(s.en);
        } else {
          fb.className = "feedback great"; fb.textContent = verdict === "great" ? "מושלם! 🌟" : "יפה מאוד! 👏";
          Score.add(); soundCorrect(); confetti(60); speakHe("כל הכבוד!");
        }
      } catch (e) {
        if (isMicPermissionError(e)) {
          fb.className = "feedback try"; fb.textContent = "אין גישה למיקרופון 🎤"; showMicNote(fb);
        } else {
          fb.className = "feedback try"; fb.textContent = "לא שמעתי… לחצי שוב על המיקרופון 🎤";
          speakHe("לא שמעתי, עוד פעם");
        }
      } finally { btn.classList.remove("recording"); btn.disabled = false; }
    }

    /* מסך סיום למשחק "קצת עליי" */
    function finishAbout() {
      stage.innerHTML = "";
      confetti(180); soundWin();
      stage.appendChild(el("div", "big-emoji", "🌟"));
      stage.appendChild(el("div", "prompt-he", "כל הכבוד שי! עכשיו את יודעת לספר על עצמך באנגלית! 🎉"));
      const acts = el("div", "actions");
      const again = el("button", "action next", "🔁 עוד פעם");
      again.onclick = () => Games.about();
      const toMenu = el("button", "action ghost", "🏠 לתפריט");
      toMenu.onclick = showMenu;
      acts.append(again, toMenu);
      stage.appendChild(acts);
      speakHe("כל הכבוד! עכשיו את יודעת לספר על עצמך באנגלית");
    }

    /* מציג הודעה ידידותית כשאין גישה למיקרופון */
    function showMicNote(fb) {
      if (stage.querySelector(".mic-note")) return;
      const note = el("div", "mic-note",
        "🎤 כדי לחזור על המילים צריך מיקרופון.<br>פתחי את המשחק עם הקובץ <b>הפעלה.bat</b> (נפתח ב-Chrome), ואשרי גישה למיקרופון.<br>בינתיים אפשר להמשיך לשמוע ולתרגל 🙂");
      stage.appendChild(note);
    }

    /* הקלטה + משוב הגייה (משוב בעברית עבור שי) */
    async function recordAndScore(w, fb, btn, fbLang) {
      if (!RECOGNITION_OK) {
        fb.className = "feedback great"; fb.textContent = "יופי! כל הכבוד 👏";
        Score.add(); soundCorrect(); speakHe("יופי!"); return;
      }
      // ביקוש הרשאת מיקרופון (חלון אישור מופיע פעם אחת)
      fb.className = "feedback heard"; fb.textContent = "🎤 רגע…";
      const ok = await ensureMic();
      if (!ok) {
        fb.className = "feedback try"; fb.textContent = "אין גישה למיקרופון 🎤";
        showMicNote(fb); speakHe("צריך לאשר מיקרופון"); return;
      }
      btn.classList.add("recording"); btn.disabled = true;
      fb.className = "feedback heard"; fb.textContent = "🎤 מקשיבה לך…";
      try {
        const res = await listen("en-US");
        const verdict = scorePronunciation(w.en, res.alternatives);
        if (verdict === "great") {
          fb.className = "feedback great"; fb.textContent = "מושלם! נהדר! 🌟";
          Score.add(); soundCorrect(); confetti(70); speakHe("מצוין! יפה מאוד!");
        } else if (verdict === "close") {
          fb.className = "feedback close"; fb.textContent = "כמעט! בואי נשמע שוב 👂";
          soundTry(); await speakHe("כמעט! תקשיבי שוב"); await speakEnSlow(w.en);
        } else {
          fb.className = "feedback try"; fb.textContent = "בואי ננסה שוב יחד 🙂";
          soundTry(); await speakHe("בואי נשמע שוב"); await speakEnSlow(w.en);
        }
      } catch (e) {
        if (isMicPermissionError(e)) {
          fb.className = "feedback try"; fb.textContent = "אין גישה למיקרופון 🎤";
          showMicNote(fb);
        } else {
          fb.className = "feedback try"; fb.textContent = "לא שמעתי… לחצי שוב על המיקרופון 🎤";
          speakHe("לא שמעתי, עוד פעם");
        }
      } finally { btn.classList.remove("recording"); btn.disabled = false; }
    }

    // הוראת פתיחה
    document.addEventListener("pointerdown", () => {}, { once: true });
  </script>
</body>
</html>
