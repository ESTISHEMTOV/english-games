<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tom's English Games 👧</title>
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <button class="btn-back" id="back">⬅️ חזרה</button>
      <div class="score" id="score">⭐ 0</div>
    </div>

    <!-- תפריט -->
    <div id="menu">
      <h1 class="page-title">Hi Tom! 👧</h1>
      <p class="subtitle">Choose a game · בחרי משחק</p>
      <div class="games-grid">
        <button class="game-card c-pink"   onclick="Games.repeat()">
          <span class="ico">🎧</span><span class="ttl">Listen & Repeat</span><span class="sub">לפי נושאים</span>
        </button>
        <button class="game-card c-purple" onclick="Games.spell()">
          <span class="ico">🔡</span><span class="ttl">Spell It!</span><span class="sub">לאיית את המילה</span>
        </button>
        <button class="game-card c-teal"   onclick="Games.phrases()">
          <span class="ico">💬</span><span class="ttl">Word Power</span><span class="sub">I can · I see · I like</span>
        </button>
        <button class="game-card c-peach"  onclick="Games.missing()">
          <span class="ico">✏️</span><span class="ttl">Missing Letters</span><span class="sub">השלמת אותיות</span>
        </button>
        <button class="game-card c-blue"   onclick="Games.memory()">
          <span class="ico">🃏</span><span class="ttl">Memory Match</span><span class="sub">מילה ↔ תמונה</span>
        </button>
        <button class="game-card c-green"  onclick="Games.find()">
          <span class="ico">🔍</span><span class="ttl">Find the Word</span><span class="sub">האזנה והבנה</span>
        </button>
        <button class="game-card c-yellow" onclick="Games.progress()">
          <span class="ico">🏆</span><span class="ttl">My Progress</span><span class="sub">שלבים ואליפויות</span>
        </button>
      </div>
    </div>

    <!-- בחירת נושא -->
    <div id="topicWrap" class="hidden">
      <h1 class="page-title">Pick a topic 📚</h1>
      <p class="subtitle">בחרי נושא</p>
      <div class="games-grid" id="topicGrid"></div>
    </div>

    <!-- מסך המשחק -->
    <div id="stageWrap" class="hidden">
      <div class="stage" id="stage"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="shared.js"></script>
  <script>
    const menu = document.getElementById("menu");
    const topicWrap = document.getElementById("topicWrap");
    const topicGrid = document.getElementById("topicGrid");
    const stageWrap = document.getElementById("stageWrap");
    const stage = document.getElementById("stage");
    Score.init(document.getElementById("score"), "tom");

    const views = [menu, topicWrap, stageWrap];
    function show(v) { speechSynthesis && speechSynthesis.cancel(); views.forEach(x => x.classList.toggle("hidden", x !== v)); }
    function showMenu() { show(menu); }
    function showStage() { show(stageWrap); stage.innerHTML = ""; }

    document.getElementById("back").onclick = () => {
      if (!stageWrap.classList.contains("hidden") || !topicWrap.classList.contains("hidden")) showMenu();
      else location.href = "index.html";
    };

    const COLORS = ["c-pink","c-purple","c-teal","c-peach","c-blue","c-green","c-yellow"];
    // בורר נושאים — מקבל פונקציית המשך שמקבלת מערך מילים
    function chooseTopic(then) {
      show(topicWrap);
      topicGrid.innerHTML = "";
      Object.entries(VOCAB).forEach(([key, t], i) => {
        const b = el("button", "game-card " + COLORS[i % COLORS.length]);
        b.innerHTML = `<span class="ico">${t.emoji}</span><span class="ttl">${t.enLabel}</span><span class="sub">${t.he}</span>`;
        b.onclick = () => then(t.words.map(w => ({ ...w, topic: key })), t);
        topicGrid.appendChild(b);
      });
    }

    const Games = {
      /* ---------- 1. Listen & Repeat (by topic) ---------- */
      repeat() {
        chooseTopic((words) => {
          showStage();
          let pool = shuffle(words), i = 0;
          const render = () => {
            const w = pool[i % pool.length];
            stage.innerHTML = "";
            stage.appendChild(el("div", "prompt-en", "Listen and say the word 🗣️"));
            stage.appendChild(el("div", "big-emoji", w.emoji));
            stage.appendChild(el("div", "big-word", w.en));
            const fb = el("div", "feedback");
            const acts = el("div", "actions");
            const bL = el("button", "action listen", "🔊 Listen");
            bL.onclick = () => { fb.className = "feedback"; fb.textContent = ""; speakEn(w.en); };
            const bS = el("button", "action speak", "🎤 Your turn!");
            bS.onclick = () => recordAndScore(w.en, fb, bS);
            const bN = el("button", "action next", "➡️ Next");
            bN.onclick = () => { i++; render(); };
            acts.append(bL, bS, bN);
            stage.append(fb, acts);
            speakEn("Listen and repeat").then(() => speakEn(w.en));
          };
          render();
        });
      },

      /* ---------- 2. Spell It! — בניית המילה מאותיות מעורבבות ---------- */
      spell() {
        showStage();
        const pool = ALL_WORDS.filter(x => x.en.length >= 3 && x.en.length <= 8 && /^[a-z]+$/.test(x.en));
        const round = () => {
          const w = randItem(pool);
          const word = w.en;
          const bank = shuffle(word.split("")).map((ch, i) => ({ ch, id: i, used: false }));
          const placed = []; // מזהי אותיות לפי הסדר שהונחו

          stage.innerHTML = "";
          stage.appendChild(el("div", "prompt-en", "Spell the word 🔡"));
          stage.appendChild(el("div", "prompt-he", "תשמעי את המילה ובני אותה מהאותיות"));
          stage.appendChild(el("div", "big-emoji", w.emoji));
          const slotRow = el("div", "letters");
          const fb = el("div", "feedback");
          const bankRow = el("div", "letters");

          const check = () => {
            const built = placed.map(pid => bank[pid].ch).join("");
            if (built === word) {
              soundCorrect(); Score.add(); confetti(80);
              fb.className = "feedback great"; fb.textContent = `Yes! ${word} 🌟`;
              [...bankRow.children].forEach(c => c.disabled = true);
              speakEn(word);
            } else {
              soundTry();
              fb.className = "feedback close"; fb.textContent = "Not quite — tap a letter to take it back 🙂";
            }
          };

          const draw = () => {
            // משבצות המילה
            slotRow.innerHTML = "";
            for (let i = 0; i < word.length; i++) {
              const pid = placed[i];
              if (pid == null) {
                slotRow.appendChild(el("div", "letter blank", "_"));
              } else {
                const s = el("button", "letter filled", bank[pid].ch.toUpperCase());
                s.onclick = () => { bank[pid].used = false; placed.splice(i, 1); fb.className = "feedback"; fb.textContent = ""; draw(); };
                slotRow.appendChild(s);
              }
            }
            // מאגר האותיות
            bankRow.innerHTML = "";
            bank.forEach((t) => {
              const b = el("button", "letter-pick", t.ch.toUpperCase());
              b.disabled = t.used;
              b.onclick = () => {
                if (t.used || placed.length >= word.length) return;
                t.used = true; placed.push(t.id); soundPop(); draw();
                if (placed.length === word.length) check();
              };
              bankRow.appendChild(b);
            });
          };

          draw();
          stage.append(slotRow, fb, bankRow);
          const acts = el("div", "actions");
          const hear = el("button", "action listen", "🔊 Listen");
          hear.onclick = () => speakEn(word);
          const clear = el("button", "action ghost", "↺ Clear");
          clear.onclick = () => { bank.forEach(t => t.used = false); placed.length = 0; fb.className = "feedback"; fb.textContent = ""; draw(); };
          const nx = el("button", "action next", "➡️ Next");
          nx.onclick = round;
          acts.append(hear, clear, nx); stage.appendChild(acts);
          speakEn("Spell the word").then(() => speakEn(word));
        };
        round();
      },

      /* ---------- 3. Word Power — build a phrase ---------- */
      phrases() {
        showStage();
        const round = () => {
          const p = randItem(PHRASES);
          const tiles = shuffle(p.parts.map((t, idx) => ({ t, idx })));
          let next = 0;
          stage.innerHTML = "";
          stage.appendChild(el("div", "prompt-en", "Build the sentence 🧩"));
          stage.appendChild(el("div", "prompt-he", "בני את המשפט לפי הסדר, ואז הגי אותו"));
          stage.appendChild(el("div", "big-emoji", p.emoji));
          const line = el("div", "big-word", "____");
          line.style.minHeight = "1.2em"; line.textContent = "";
          stage.appendChild(line);
          const fb = el("div", "feedback");
          const bank = el("div", "letters");
          const built = [];
          tiles.forEach(({ t, idx }) => {
            const b = el("button", "letter-pick", t);
            b.style.width = "auto"; b.style.padding = "0 18px"; b.style.fontSize = "26px";
            b.onclick = () => {
              if (idx === next) {
                soundPop(); b.disabled = true; built.push(t); line.textContent = built.join(" ");
                next++;
                if (next === p.parts.length) {
                  soundCorrect(); Score.add(); confetti(80);
                  fb.className = "feedback great"; fb.textContent = "Great sentence! 🎉";
                  speakEn(p.en).then(() => {
                    const acts = stage.querySelector(".actions");
                    const bS = el("button", "action speak", "🎤 Say it!");
                    bS.onclick = () => recordAndScore(p.en, fb, bS);
                    acts.insertBefore(bS, acts.firstChild);
                  });
                }
              } else { soundTry(); fb.className = "feedback try"; fb.textContent = "Not yet — start from the first word 🙂"; }
            };
            bank.appendChild(b);
          });
          stage.append(bank, fb);
          const acts = el("div", "actions");
          const hear = el("button", "action listen", "🔊 Listen");
          hear.onclick = () => speakEn(p.en);
          const nx = el("button", "action next", "➡️ Next");
          nx.onclick = round;
          acts.append(hear, nx); stage.appendChild(acts);
          speakEn("Build the sentence: " + p.en);
        };
        round();
      },

      /* ---------- 4. Missing Letters ---------- */
      missing() {
        showStage();
        const round = () => {
          const w = randItem(ALL_WORDS.filter(x => x.en.length >= 3 && x.en.length <= 7));
          const word = w.en;
          // מסתירים אות אחת (לא הראשונה)
          const hideIdx = 1 + ((Math.random() * (word.length - 1)) | 0);
          const missing = word[hideIdx].toLowerCase();
          stage.innerHTML = "";
          stage.appendChild(el("div", "prompt-en", "Which letter is missing? ✏️"));
          stage.appendChild(el("div", "prompt-he", "איזו אות חסרה?"));
          stage.appendChild(el("div", "big-emoji", w.emoji));
          const row = el("div", "letters");
          const slots = [];
          word.split("").forEach((ch, i) => {
            const s = el("div", "letter" + (i === hideIdx ? " blank" : ""), i === hideIdx ? "?" : ch.toUpperCase());
            slots.push(s); row.appendChild(s);
          });
          const fb = el("div", "feedback");
          const opts = shuffle([missing, ...sample("abcdefghiklmnoprstuw".split("").filter(l => l !== missing), 3)]);
          const pick = el("div", "letters");
          opts.forEach(L => {
            const b = el("button", "letter-pick", L.toUpperCase());
            b.onclick = () => {
              if (L === missing) {
                soundCorrect(); Score.add(); confetti(70);
                slots[hideIdx].textContent = L.toUpperCase(); slots[hideIdx].className = "letter filled";
                [...pick.children].forEach(c => c.disabled = true);
                fb.className = "feedback great"; fb.textContent = `Yes! ${word} 🌟`;
                speakEn(word);
              } else { soundTry(); b.disabled = true; fb.className = "feedback try"; fb.textContent = "Try again 🙂"; }
            };
            pick.appendChild(b);
          });
          stage.append(row, pick, fb);
          const acts = el("div", "actions");
          const hear = el("button", "action listen", "🔊 Hear word");
          hear.onclick = () => speakEn(word);
          const nx = el("button", "action next", "➡️ Next"); nx.onclick = round;
          acts.append(hear, nx); stage.appendChild(acts);
          speakEn("Which letter is missing?");
        };
        round();
      },

      /* ---------- 5. Memory Match (word ↔ picture) ---------- */
      memory() {
        showStage();
        const picks = sample(ALL_WORDS, 4);
        const cards = shuffle([
          ...picks.map(w => ({ w, kind: "pic" })),
          ...picks.map(w => ({ w, kind: "word" })),
        ]);
        stage.innerHTML = "";
        stage.appendChild(el("div", "prompt-en", "Match the word to the picture 🃏"));
        stage.appendChild(el("div", "prompt-he", "חברי כל מילה לתמונה שלה"));
        const grid = el("div", "memory");
        let first = null, lock = false, matched = 0;
        cards.forEach(c => {
          const face = c.kind === "pic" ? `<span style="font-size:46px">${c.w.emoji}</span>` : `<span style="font-size:22px">${c.w.en}</span>`;
          const card = el("button", "mcard");
          card.innerHTML = `<span class="back">❓</span><span class="face">${face}</span>`;
          card.onclick = () => {
            if (lock || card.classList.contains("up") || card.classList.contains("matched")) return;
            soundPop(); card.classList.add("up");
            if (!first) { first = { card, c }; return; }
            if (first.c.w.en === c.w.en && first.c.kind !== c.kind) {
              card.classList.add("matched"); first.card.classList.add("matched");
              soundCorrect(); Score.add(); matched++; speakEn(c.w.en); first = null;
              if (matched === picks.length) { confetti(150); soundWin(); speakEn("You won! Great job!"); }
            } else {
              lock = true;
              setTimeout(() => { card.classList.remove("up"); first.card.classList.remove("up"); first = null; lock = false; }, 900);
            }
          };
          grid.appendChild(card);
        });
        stage.appendChild(grid);
        speakEn("Match the word to the picture");
      },

      /* ---------- 6. Find the Word (listening) ---------- */
      find() {
        showStage();
        const round = () => {
          const opts = sample(ALL_WORDS, 4);
          const target = randItem(opts);
          stage.innerHTML = "";
          stage.appendChild(el("div", "prompt-en", "Listen — which one is it? 👂"));
          const fb = el("div", "feedback");
          const choices = el("div", "choices");
          opts.forEach(o => {
            const c = el("button", "choice");
            c.innerHTML = `<span class="ce">${o.emoji}</span><span class="cw">${o.en}</span>`;
            c.onclick = () => {
              if (o.en === target.en) {
                c.classList.add("correct"); soundCorrect(); Score.add(); confetti(70);
                fb.className = "feedback great"; fb.textContent = "Correct! 🎉"; speakEn("Yes! " + target.en);
                setTimeout(round, 1400);
              } else { c.classList.add("wrong"); soundTry(); fb.className = "feedback try"; fb.textContent = "Try again 🙂"; setTimeout(() => c.classList.remove("wrong"), 500); }
            };
            choices.appendChild(c);
          });
          stage.append(choices, fb);
          const acts = el("div", "actions");
          const b = el("button", "action listen", "🔊 Listen again");
          b.onclick = () => speakEn(target.en);
          acts.appendChild(b); stage.appendChild(acts);
          speakEn(target.en);
        };
        round();
      },

      /* ---------- 🏆 My Progress ---------- */
      progress() {
        showStage();
        renderProgress(stage, "tom");
        speakEn("This is your progress. Great job!");
      },
    };

    /* מציג הודעה כשאין גישה למיקרופון */
    function showMicNote(fb) {
      if (stage.querySelector(".mic-note")) return;
      const note = el("div", "mic-note",
        "🎤 To repeat the words you need a microphone.<br>פתחי את המשחק עם הקובץ <b>הפעלה.bat</b> (נפתח ב-Chrome), ואשרי גישה למיקרופון.<br>You can keep listening and practicing meanwhile 🙂");
      stage.appendChild(note);
    }

    /* הקלטה + ציון הגייה (משוב באנגלית לתום) */
    async function recordAndScore(word, fb, btn) {
      if (!RECOGNITION_OK) {
        fb.className = "feedback great"; fb.textContent = "Nice! You said it 👏"; Score.add(); soundCorrect(); return;
      }
      fb.className = "feedback heard"; fb.textContent = "🎤 …";
      const ok = await ensureMic();
      if (!ok) {
        fb.className = "feedback try"; fb.textContent = "No microphone access 🎤";
        showMicNote(fb); return;
      }
      btn.classList.add("recording"); btn.disabled = true;
      fb.className = "feedback heard"; fb.textContent = "🎤 Listening…";
      try {
        const res = await listen("en-US");
        const verdict = scorePronunciation(word, res.alternatives);
        if (verdict === "great") {
          fb.className = "feedback great"; fb.textContent = "Perfect! 🌟"; Score.add(); soundCorrect(); confetti(70);
          speakEn("Perfect!");
        } else if (verdict === "close") {
          fb.className = "feedback close"; fb.textContent = `Almost! Listen again 👂 (${res.transcript})`;
          soundTry(); await speakEn("Almost! Listen again"); await speakEnSlow(word);
        } else {
          fb.className = "feedback try"; fb.textContent = `Let's try again 🙂 (I heard: ${res.transcript || "—"})`;
          soundTry(); await speakEn("Let's try again. Listen"); await speakEnSlow(word);
        }
      } catch (e) {
        if (isMicPermissionError(e)) {
          fb.className = "feedback try"; fb.textContent = "No microphone access 🎤";
          showMicNote(fb);
        } else {
          fb.className = "feedback try"; fb.textContent = "I didn't hear you — tap the mic again 🎤";
        }
      } finally { btn.classList.remove("recording"); btn.disabled = false; }
    }
  </script>
</body>
</html>
